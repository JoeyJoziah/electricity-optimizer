# Gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Custom rules for RateShift service-specific credential patterns.
# Extends the default gitleaks ruleset so built-in detections
# (AWS keys, GitHub tokens, generic API keys, etc.) remain active.

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Custom Rules — service-specific credential patterns used by RateShift
# ---------------------------------------------------------------------------

[[rules]]
id = "upstash-redis-url"
description = "Upstash Redis connection URL containing embedded credentials"
regex = '''rediss?://[^:]+:[^@]+@[^.]+\.upstash\.io:\d+'''
tags = ["key", "redis", "upstash"]
keywords = ["upstash"]

[[rules]]
id = "neon-connection-string"
description = "Neon PostgreSQL connection string containing embedded credentials"
regex = '''postgres(?:ql)?://[^:]+:[^@]+@[^\s"']+\.neon\.tech/[^\s"']+'''
tags = ["key", "database", "neon", "postgresql"]
keywords = ["neon.tech"]

[[rules]]
id = "otlp-basic-auth-header"
description = "OTLP exporter Authorization header with Basic auth credentials"
regex = '''(?i)(?:OTEL_EXPORTER_OTLP_HEADERS|Authorization)\s*=\s*Basic\s+[A-Za-z0-9+/=]{16,}'''
tags = ["key", "otlp", "grafana", "opentelemetry"]
keywords = ["OTLP", "Authorization"]

[[rules]]
id = "composio-api-key"
description = "Composio API key for agent tool integrations"
regex = '''(?i)COMPOSIO_API_KEY\s*=\s*["\']?[A-Za-z0-9_\-]{20,}["\']?'''
tags = ["key", "composio", "api"]
keywords = ["COMPOSIO_API_KEY"]

[[rules]]
id = "onesignal-rest-api-key"
description = "OneSignal REST API key for push notifications"
regex = '''(?i)ONESIGNAL_REST_API_KEY\s*=\s*["\']?[A-Za-z0-9_\-]{20,}["\']?'''
tags = ["key", "onesignal", "push"]
keywords = ["ONESIGNAL_REST_API_KEY"]

# ---------------------------------------------------------------------------
# Allowlist — suppress false positives in tests, docs, and generated files
# ---------------------------------------------------------------------------

[allowlist]
description = "Global allowlist for test fixtures, documentation, and generated files"
paths = [
  # DSP (Data Structure Protocol) UID map contains auto-generated object hashes
  # that trigger false positives on generic-api-key rules
  '''.dsp/.*''',
  # Test files — may contain example/mock credentials
  '''.*test.*\.py''',
  '''.*_test\.py''',
  '''.*_test\.go''',
  '''.*\.test\.ts''',
  '''.*\.test\.tsx''',
  '''.*spec\.ts''',
  '''.*spec\.tsx''',
  # Test fixture directories
  '''.*__fixtures__/.*''',
  '''.*__mocks__/.*''',
  # Documentation files — may reference credential formats in examples
  '''.*\.md''',
  # Environment example files — contain placeholder/dummy values
  '''.*\.env\.example''',
  # Audit report directories
  '''\.audit-.*/.*''',
]
