name = "rateshift-api-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Route: all requests to api.rateshift.app go through this Worker
routes = [
  { pattern = "api.rateshift.app/*", zone_name = "rateshift.app" }
]

# KV Namespaces (CACHE only — rate limiting moved to native bindings)
kv_namespaces = [
  { binding = "CACHE", id = "6946d19ce8264f6fae4481d6ad8afcd1" }
]

# Native rate limiting bindings (GA Sept 2025, zero KV cost)
# Counters maintained in-memory at edge PoP, no KV reads/writes
[[ratelimits]]
binding = "RATE_LIMITER_STANDARD"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 120
  period = 60

[[ratelimits]]
binding = "RATE_LIMITER_STRICT"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
binding = "RATE_LIMITER_INTERNAL"
namespace_id = "1003"
  [ratelimits.simple]
  limit = 600
  period = 60

# Environment variables (non-secret)
[vars]
ALLOWED_ORIGINS = "https://rateshift.app,https://www.rateshift.app"

# Secrets (set via `wrangler secret put`):
# - ORIGIN_URL          (Render backend URL — MUST be a secret to prevent bypass of CF Worker security layer)
# - INTERNAL_API_KEY
# - RATE_LIMIT_BYPASS_KEY

# Cron Triggers — replaces GHA crons for check-alerts, price-sync, observe-forecasts
[triggers]
crons = [
  "*/10 * * * *",  # keep-alive: every 10 minutes — prevents Render free tier cold starts
  "0 */3 * * *",   # check-alerts: every 3 hours
  "0 */6 * * *",   # price-sync: every 6 hours (matches old GHA schedule)
  "30 */6 * * *",  # observe-forecasts: 30min after price-sync
]
