[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gpu: marks tests that require GPU
    requires_tf: marks tests that require TensorFlow

# Default options applied to every pytest run.
#
# -m "not slow" is intentionally NOT set here so that developers can run slow
# tests locally by default.  CI overrides with '-m "not slow"' in the workflow.
#
# --timeout requires pytest-timeout (listed in requirements-dev.txt).
addopts =
    -v
    --tb=short
    -ra
    --strict-markers

# Logging
log_cli = true
log_cli_level = WARNING

# Coverage configuration (when using pytest-cov)
# Uncomment to enable coverage
# addopts = --cov=ml --cov-report=html --cov-report=term-missing

# Filter warnings — suppress known noisy deprecation warnings from heavy ML
# dependencies so CI output stays readable.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:tensorflow
    ignore::UserWarning:torch
    ignore::FutureWarning:numpy
    ignore::FutureWarning:pandas

# Minimum version
minversion = 7.0
