name: Scrape Utility Portals

on:
  schedule:
    # Weekly Sunday 5am UTC — avoids collision with scrape-rates (3am) and
    # model-retrain (5am Sun is fine; scrape-portals is lightweight)
    - cron: "0 5 * * 0"
  workflow_dispatch:

concurrency:
  group: scrape-portals
  cancel-in-progress: true

jobs:
  scrape:
    name: Scrape Portal Connections
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Scrape portals
        id: scrape
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/scrape-portals
          method: POST
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json
          body: '{}'
          max-retries: "3"
          retry-delay: "10"

      - name: Log result
        if: always()
        run: |
          echo "HTTP status: ${{ steps.scrape.outputs.status-code }}"
          echo "Attempts:    ${{ steps.scrape.outputs.attempts }}"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Scrape Utility Portals"
          severity: warning
