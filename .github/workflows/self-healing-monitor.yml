name: Self-Healing Monitor

on:
  schedule:
    # Daily at 9am UTC (after overnight crons complete)
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: self-healing-monitor
  cancel-in-progress: true

permissions:
  issues: write
  actions: read

env:
  GH_TOKEN: ${{ github.token }}
  FAILURE_THRESHOLD: 3

jobs:
  # ===========================================================================
  # Check for repeated failures and create/update issues
  # ===========================================================================
  check-failures:
    name: Check Workflow Failures
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        workflow:
          - { file: "check-alerts.yml", name: "Check Price Alerts", severity: "warning" }
          - { file: "fetch-weather.yml", name: "Fetch Weather Data", severity: "warning" }
          - { file: "market-research.yml", name: "Market Intelligence Scan", severity: "info" }
          - { file: "sync-connections.yml", name: "Sync User Connections", severity: "warning" }
          - { file: "scrape-rates.yml", name: "Scrape Supplier Rates", severity: "info" }
          - { file: "dunning-cycle.yml", name: "Dunning Cycle", severity: "critical" }
          - { file: "kpi-report.yml", name: "Nightly KPI Report", severity: "info" }
          - { file: "price-sync.yml", name: "Sync Electricity Prices", severity: "warning" }
          - { file: "observe-forecasts.yml", name: "Observe Forecast Actuals", severity: "info" }
          - { file: "nightly-learning.yml", name: "Nightly Learning Cycle", severity: "info" }
          - { file: "data-retention.yml", name: "Weekly Data Retention Cleanup", severity: "warning" }
          - { file: "data-health-check.yml", name: "Data Health Check", severity: "warning" }
          - { file: "e2e-tests.yml", name: "E2E Tests", severity: "warning" }
          - { file: "deploy-worker.yml", name: "Deploy Cloudflare Worker", severity: "critical" }
          - { file: "scan-emails.yml", name: "Scan Email Connections", severity: "warning" }
          - { file: "scrape-portals.yml", name: "Scrape Utility Portals", severity: "warning" }
          - { file: "fetch-heating-oil.yml", name: "Fetch Petroleum Prices", severity: "warning" }
          - { file: "daily-data-pipeline.yml", name: "Daily Data Pipeline", severity: "warning" }

    steps:
      - name: Count recent failures
        id: count
        env:
          WORKFLOW_FILE: ${{ matrix.workflow.file }}
          WORKFLOW_NAME: ${{ matrix.workflow.name }}
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
          FAILURES=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "$WORKFLOW_FILE" \
            --created ">$SINCE" \
            --status failure \
            --json conclusion \
            --jq 'length' 2>/dev/null || echo "0")
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"
          echo "$WORKFLOW_NAME: $FAILURES failures in last 24h"

      - name: Check for existing issue
        id: existing
        if: steps.count.outputs.failures >= env.FAILURE_THRESHOLD
        env:
          WORKFLOW_NAME: ${{ matrix.workflow.name }}
        run: |
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "self-healing,automated" \
            --state open \
            --search "$WORKFLOW_NAME" \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || echo "")
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Create new issue
        if: steps.count.outputs.failures >= env.FAILURE_THRESHOLD && steps.existing.outputs.issue == ''
        env:
          WORKFLOW_FILE: ${{ matrix.workflow.file }}
          WORKFLOW_NAME: ${{ matrix.workflow.name }}
          WORKFLOW_SEVERITY: ${{ matrix.workflow.severity }}
          FAILURE_COUNT: ${{ steps.count.outputs.failures }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Self-healing: $WORKFLOW_NAME has $FAILURE_COUNT failures in 24h" \
            --label "self-healing,automated" \
            --body "$(cat <<BODY
          ## Automated Failure Detection

          **Workflow**: $WORKFLOW_NAME (\`$WORKFLOW_FILE\`)
          **Severity**: $WORKFLOW_SEVERITY
          **Failures in last 24h**: $FAILURE_COUNT
          **Detected at**: $(date -u '+%Y-%m-%d %H:%M UTC')

          ## Investigation Checklist

          - [ ] Check [workflow run logs](https://github.com/${{ github.repository }}/actions/workflows/${{ matrix.workflow.file }})
          - [ ] Verify `INTERNAL_API_KEY` secret matches backend configuration
          - [ ] Verify `BACKEND_URL` secret is correct and backend is healthy
          - [ ] Check if the backend endpoint is responding (test with curl)
          - [ ] Check for rate limiting or API quota exhaustion
          - [ ] Review recent deployments that may have broken the endpoint

          ---
          *This issue was auto-created by the self-healing monitor. It will be auto-closed when the last 3 runs succeed.*
          BODY
          )"

      - name: Update existing issue
        if: steps.count.outputs.failures >= env.FAILURE_THRESHOLD && steps.existing.outputs.issue != ''
        env:
          EXISTING_ISSUE: ${{ steps.existing.outputs.issue }}
          FAILURE_COUNT: ${{ steps.count.outputs.failures }}
        run: |
          gh issue comment "$EXISTING_ISSUE" \
            --repo "${{ github.repository }}" \
            --body "**Update**: $FAILURE_COUNT failures detected in the last 24h ($(date -u '+%Y-%m-%d %H:%M UTC')). Issue remains open."

      - uses: actions/checkout@v4
        if: steps.count.outputs.failures >= env.FAILURE_THRESHOLD && steps.existing.outputs.issue == ''
        with:
          sparse-checkout: .github/actions

      - name: Notify Slack on new issues
        if: steps.count.outputs.failures >= env.FAILURE_THRESHOLD && steps.existing.outputs.issue == ''
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Self-Healing: ${{ matrix.workflow.name }} (${{ steps.count.outputs.failures }} failures)"
          severity: "${{ matrix.workflow.severity }}"

  # ===========================================================================
  # Auto-close resolved issues
  # ===========================================================================
  auto-close-resolved:
    name: Auto-Close Resolved Issues
    runs-on: ubuntu-latest
    needs: check-failures
    if: always()
    timeout-minutes: 5

    steps:
      - name: Find and close resolved issues
        run: |
          # Get all open self-healing issues
          ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "self-healing,automated" \
            --state open \
            --json number,title \
            --jq '.[] | "\(.number)|\(.title)"' 2>/dev/null || echo "")

          if [ -z "$ISSUES" ]; then
            echo "No open self-healing issues found."
            exit 0
          fi

          echo "$ISSUES" | while IFS='|' read -r ISSUE_NUM ISSUE_TITLE; do
            # Extract workflow file from title (between backticks or from known mapping)
            # Try to match workflow name to file
            WORKFLOW_FILE=""
            case "$ISSUE_TITLE" in
              *"Check Price Alerts"*) WORKFLOW_FILE="check-alerts.yml" ;;
              *"Fetch Weather"*) WORKFLOW_FILE="fetch-weather.yml" ;;
              *"Market Intelligence"*) WORKFLOW_FILE="market-research.yml" ;;
              *"Sync User Connections"*) WORKFLOW_FILE="sync-connections.yml" ;;
              *"Scrape Supplier"*) WORKFLOW_FILE="scrape-rates.yml" ;;
              *"Dunning"*) WORKFLOW_FILE="dunning-cycle.yml" ;;
              *"KPI Report"*) WORKFLOW_FILE="kpi-report.yml" ;;
              *"Sync Electricity"*) WORKFLOW_FILE="price-sync.yml" ;;
              *"Observe Forecast"*) WORKFLOW_FILE="observe-forecasts.yml" ;;
              *"Nightly Learning"*) WORKFLOW_FILE="nightly-learning.yml" ;;
              *"Data Retention"*) WORKFLOW_FILE="data-retention.yml" ;;
              *"Data Health"*) WORKFLOW_FILE="data-health-check.yml" ;;
              *"E2E"*) WORKFLOW_FILE="e2e-tests.yml" ;;
              *"Cloudflare Worker"*) WORKFLOW_FILE="deploy-worker.yml" ;;
              *"Scan Email"*) WORKFLOW_FILE="scan-emails.yml" ;;
              *"Scrape Utility Portal"*|*"Portal"*) WORKFLOW_FILE="scrape-portals.yml" ;;
              *"Petroleum"*|*"Heating Oil"*) WORKFLOW_FILE="fetch-heating-oil.yml" ;;
              *"Daily Data Pipeline"*) WORKFLOW_FILE="daily-data-pipeline.yml" ;;
              *) echo "Unknown workflow in issue #$ISSUE_NUM: $ISSUE_TITLE"; continue ;;
            esac

            # Check last 3 runs
            RECENT=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$WORKFLOW_FILE" \
              --limit 3 \
              --json conclusion \
              --jq '[.[] | .conclusion] | if length == 0 then ["unknown"] else . end' 2>/dev/null || echo '["unknown"]')

            ALL_SUCCESS=$(echo "$RECENT" | jq -r 'all(. == "success")')

            if [ "$ALL_SUCCESS" = "true" ]; then
              echo "Closing issue #$ISSUE_NUM — last 3 runs of $WORKFLOW_FILE succeeded"
              gh issue close "$ISSUE_NUM" \
                --repo "${{ github.repository }}" \
                --comment "Auto-resolved: Last 3 runs of \`$WORKFLOW_FILE\` succeeded. Closing this issue."
            else
              echo "Issue #$ISSUE_NUM still open — recent results: $RECENT"
            fi
          done
