name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ===========================================================================
  # Detect what changed to skip irrelevant jobs
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'

  e2e-tests:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: electricity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: backend
          install-dev: 'true'

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node-env

      - name: Install Playwright browsers
        id: pw-install
        run: |
          cd frontend
          npx playwright install --with-deps chromium firefox webkit || {
            echo "First attempt failed, retrying in 10s..."
            sleep 10
            npx playwright install --with-deps chromium firefox webkit
          }

      - name: Set up database
        run: |
          # Apply ALL migrations in sequential order (not just the first 3).
          # This ensures E2E tests run against the same schema as production.
          for f in $(ls backend/migrations/[0-9]*.sql backend/migrations/init_neon.sql 2>/dev/null | sort); do
            echo "Applying migration: $f"
            PGPASSWORD=postgres psql -h localhost -U postgres -d electricity_test -f "$f"
          done
        env:
          PGHOST: localhost

      - name: Start backend server
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/electricity_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          JWT_SECRET: test_secret_key_for_ci_minimum_32_chars

      - name: Wait for backend
        uses: ./.github/actions/wait-for-service
        with:
          url: http://localhost:8000/health
          timeout: '120'
          interval: '3'

      - name: Cache Next.js build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Start frontend server
        run: |
          cd frontend
          npm run build
          npm run start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Wait for frontend
        uses: ./.github/actions/wait-for-service
        with:
          url: http://localhost:3000
          timeout: '120'
          interval: '3'

      - name: Run smoke tests (fast path)
        id: smoke
        continue-on-error: true
        run: |
          cd frontend
          npx playwright test --grep @smoke --project=chromium --reporter=list
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000

      - name: Run E2E tests
        id: e2e-first
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        run: |
          cd frontend
          npx playwright test --reporter=html
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000

      - name: Retry failed E2E tests
        id: e2e-retry
        if: steps.smoke.outcome == 'success' && steps.e2e-first.outcome == 'failure'
        run: |
          cd frontend
          echo "Retrying failed tests..."
          npx playwright test --last-failed --reporter=html
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000

      - name: Evaluate E2E results
        if: steps.smoke.outcome == 'failure' || (steps.e2e-first.outcome == 'failure' && steps.e2e-retry.outcome == 'failure')
        run: |
          if [ "${{ steps.smoke.outcome }}" == "failure" ]; then
            echo "::error::Smoke tests failed — skipping full E2E suite"
          else
            echo "::error::E2E tests failed after retry"
          fi
          exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7

      - name: Upload trace files
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-traces
          path: frontend/test-results/**/*.zip
          retention-days: 7

      - name: Publish E2E Test Results
        if: always()
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        with:
          name: E2E Test Results
          path: frontend/test-results/e2e-results.xml
          reporter: java-junit

      - name: Playwright Report Summary
        if: always() && github.event_name == 'pull_request'
        uses: daun/playwright-report-summary@1229105480a2a4bdd91598d8a146fbab41343fce # v3
        with:
          report-file: frontend/test-results/e2e-results.xml

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [changes, e2e-tests]
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 20
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node-env

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Cache Next.js build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend server
        run: |
          cd frontend
          npm run start &

      - name: Wait for frontend
        uses: ./.github/actions/wait-for-service
        with:
          url: http://localhost:3000
          timeout: '60'
          interval: '3'

      - name: Run Lighthouse CI
        id: lhci
        run: |
          cd frontend
          lhci autorun 2>&1 | tee lhci-output.log
          LHCI_EXIT=${PIPESTATUS[0]}
          echo "lhci_exit_code=${LHCI_EXIT}" >> "$GITHUB_OUTPUT"

          # Extract scores from the JSON reports in .lighthouseci/
          # lhci collect outputs lhr-*.json files
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = '.lighthouseci';

          if (!fs.existsSync(dir)) {
            console.log('No .lighthouseci directory found');
            process.exit(0);
          }

          const files = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
          if (files.length === 0) {
            console.log('No Lighthouse JSON reports found');
            process.exit(0);
          }

          // Aggregate scores across all runs and URLs
          let totalPerf = 0, totalA11y = 0, totalBp = 0, totalSeo = 0;
          let count = 0;
          const urlScores = {};

          for (const file of files) {
            try {
              const report = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
              const url = report.finalUrl || report.requestedUrl || 'unknown';
              const perf = Math.round((report.categories?.performance?.score || 0) * 100);
              const a11y = Math.round((report.categories?.accessibility?.score || 0) * 100);
              const bp = Math.round((report.categories?.['best-practices']?.score || 0) * 100);
              const seo = Math.round((report.categories?.seo?.score || 0) * 100);

              totalPerf += perf;
              totalA11y += a11y;
              totalBp += bp;
              totalSeo += seo;
              count++;

              // Track per-URL (average across runs)
              if (!urlScores[url]) urlScores[url] = { perf: [], a11y: [], bp: [], seo: [] };
              urlScores[url].perf.push(perf);
              urlScores[url].a11y.push(a11y);
              urlScores[url].bp.push(bp);
              urlScores[url].seo.push(seo);
            } catch (e) {
              console.error('Error parsing ' + file + ': ' + e.message);
            }
          }

          if (count === 0) {
            console.log('No valid reports parsed');
            process.exit(0);
          }

          const avg = arr => Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);

          const avgPerf = Math.round(totalPerf / count);
          const avgA11y = Math.round(totalA11y / count);
          const avgBp = Math.round(totalBp / count);
          const avgSeo = Math.round(totalSeo / count);

          // Write scores to GITHUB_OUTPUT
          const output = process.env.GITHUB_OUTPUT;
          if (output) {
            fs.appendFileSync(output, 'perf_score=' + avgPerf + '\n');
            fs.appendFileSync(output, 'a11y_score=' + avgA11y + '\n');
            fs.appendFileSync(output, 'bp_score=' + avgBp + '\n');
            fs.appendFileSync(output, 'seo_score=' + avgSeo + '\n');
          }

          // Build per-URL markdown table for PR comment
          let table = '| URL | Performance | Accessibility | Best Practices | SEO |\n';
          table += '|-----|:-----------:|:-------------:|:--------------:|:---:|\n';
          for (const [url, scores] of Object.entries(urlScores)) {
            const shortUrl = url.replace('http://localhost:3000', '');
            const p = avg(scores.perf);
            const a = avg(scores.a11y);
            const b = avg(scores.bp);
            const s = avg(scores.seo);
            table += '| ' + (shortUrl || '/') + ' | ' + p + ' | ' + a + ' | ' + b + ' | ' + s + ' |\n';
          }

          // Write table to a file for the PR comment step
          fs.writeFileSync('.lighthouseci/scores-table.md', table);

          console.log('Average scores - Performance: ' + avgPerf + ', Accessibility: ' + avgA11y + ', Best Practices: ' + avgBp + ', SEO: ' + avgSeo);
          "

          exit ${LHCI_EXIT}
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce Lighthouse score thresholds
        if: always() && steps.lhci.outputs.perf_score != ''
        run: |
          PERF=${{ steps.lhci.outputs.perf_score }}
          A11Y=${{ steps.lhci.outputs.a11y_score }}
          BP=${{ steps.lhci.outputs.bp_score }}
          SEO=${{ steps.lhci.outputs.seo_score }}

          FAILED=0
          echo "=== Lighthouse Score Thresholds ==="
          echo "Performance:    ${PERF}/100 (threshold: 85)"
          echo "Accessibility:  ${A11Y}/100 (threshold: 90)"
          echo "Best Practices: ${BP}/100 (threshold: 85)"
          echo "SEO:            ${SEO}/100 (threshold: 90)"
          echo "=================================="

          if [ "${PERF}" -lt 85 ]; then
            echo "::error::Performance score ${PERF} is below threshold of 85"
            FAILED=1
          fi
          if [ "${A11Y}" -lt 90 ]; then
            echo "::error::Accessibility score ${A11Y} is below threshold of 90"
            FAILED=1
          fi
          if [ "${BP}" -lt 85 ]; then
            echo "::error::Best Practices score ${BP} is below threshold of 85"
            FAILED=1
          fi
          if [ "${SEO}" -lt 90 ]; then
            echo "::error::SEO score ${SEO} is below threshold of 90"
            FAILED=1
          fi

          if [ "${FAILED}" -eq 1 ]; then
            echo "::error::Lighthouse scores below required thresholds"
            exit 1
          fi

          echo "All Lighthouse scores meet thresholds"

      - name: Comment Lighthouse scores on PR
        if: always() && github.event_name == 'pull_request' && steps.lhci.outputs.perf_score != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');

            const perf = parseInt('${{ steps.lhci.outputs.perf_score }}') || 0;
            const a11y = parseInt('${{ steps.lhci.outputs.a11y_score }}') || 0;
            const bp = parseInt('${{ steps.lhci.outputs.bp_score }}') || 0;
            const seo = parseInt('${{ steps.lhci.outputs.seo_score }}') || 0;

            // Thresholds
            const thresholds = { Performance: 85, Accessibility: 90, 'Best Practices': 85, SEO: 90 };
            const scores = { Performance: perf, Accessibility: a11y, 'Best Practices': bp, SEO: seo };

            // Score emoji helper
            const emoji = (score, threshold) => {
              if (score >= threshold) return ':white_check_mark:';
              if (score >= threshold - 5) return ':warning:';
              return ':x:';
            };

            // Check for drops > 5 points below threshold
            let hasSignificantDrop = false;
            for (const [name, score] of Object.entries(scores)) {
              if (score < thresholds[name] - 5) hasSignificantDrop = true;
            }

            // Build comment body
            let body = '## :lighthouse: Lighthouse CI Results\n\n';
            body += '| Category | Score | Threshold | Status |\n';
            body += '|----------|:-----:|:---------:|:------:|\n';
            for (const [name, score] of Object.entries(scores)) {
              const threshold = thresholds[name];
              body += `| ${name} | **${score}** | ${threshold} | ${emoji(score, threshold)} |\n`;
            }

            if (hasSignificantDrop) {
              body += '\n> :rotating_light: **Warning:** One or more scores dropped more than 5 points below the threshold. Please investigate before merging.\n';
            }

            // Read per-URL table if available
            const tablePath = 'frontend/.lighthouseci/scores-table.md';
            if (fs.existsSync(tablePath)) {
              const table = fs.readFileSync(tablePath, 'utf8');
              body += '\n<details>\n<summary>Per-URL Breakdown</summary>\n\n' + table + '\n</details>\n';
            }

            body += '\n---\n*Thresholds: Performance >= 85, Accessibility >= 90, Best Practices >= 85, SEO >= 90*';

            // Find and update existing Lighthouse comment, or create new one
            const marker = '## :lighthouse: Lighthouse CI Results';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-report
          path: frontend/.lighthouseci/
          retention-days: 30

  load-tests:
    name: Load Tests (On Demand)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'load-test')
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: electricity_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: backend

      - name: Install load test tools
        run: pip install locust aiohttp

      - name: Start backend
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/electricity_test
          REDIS_URL: redis://localhost:6379/0

      - name: Wait for backend
        uses: ./.github/actions/wait-for-service
        with:
          url: http://localhost:8000/health
          timeout: '60'
          interval: '3'

      - name: Run load tests
        run: |
          cd tests/load
          ./run_load_test.sh quick
        env:
          HOST: http://localhost:8000

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: load-test-report
          path: tests/load/reports/
          retention-days: 30

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: electricity_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: backend
          install-dev: 'true'

      - name: Start backend
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/electricity_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          JWT_SECRET: test_secret_key_for_ci_minimum_32_chars

      - name: Wait for backend
        uses: ./.github/actions/wait-for-service
        with:
          url: http://localhost:8000/health
          timeout: '60'
          interval: '3'

      - name: Run security tests
        run: |
          pytest tests/security/ -v --tb=short

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/ -ll -f json -o bandit-report.json || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ===========================================================================
  # Notify on E2E Failure
  # ===========================================================================
  notify-failure:
    name: Notify E2E Failure
    runs-on: ubuntu-latest
    needs: [e2e-tests, lighthouse, security-tests]
    if: failure()
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/actions

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "E2E Tests"
          severity: warning
