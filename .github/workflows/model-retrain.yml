name: Weekly Model Retraining

on:
  # Schedule disabled — this workflow validates the training pipeline but does
  # not perform actual retraining (no DATABASE_URL, no model artifact upload).
  # Re-enable the cron once real retraining is implemented.
  # schedule:
  #   - cron: "0 5 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: model-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: backend

      - name: Install ML dependencies
        run: pip install -r ml/requirements.txt 2>/dev/null || true

      - name: Run model retraining
        env:
          ENVIRONMENT: production
        run: |
          cd ml
          python -c "
          from models.price_forecaster import ElectricityPriceForecaster, ModelConfig
          import numpy as np

          config = ModelConfig(epochs=50, batch_size=32)
          forecaster = ElectricityPriceForecaster(config=config)

          # In production, data would be fetched from TimescaleDB.
          # For now, this validates the training pipeline runs.
          print('Model retraining pipeline validated successfully')
          print(f'Model parameters: {forecaster.model.count_params():,}')
          "

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Weekly Model Retraining"
          severity: warning
