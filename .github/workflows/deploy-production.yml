name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend

jobs:
  # ===========================================================================
  # Validate Release
  # ===========================================================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
          else
            VERSION="$INPUT_VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

  # ===========================================================================
  # Run Tests (reusable workflow)
  # ===========================================================================
  test:
    name: Run Tests
    needs: [validate]
    uses: ./.github/workflows/_backend-tests.yml
    with:
      coverage: false
      upload-codecov: false

  # ===========================================================================
  # Security Gate (blocking — must pass before deploy)
  # ===========================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: backend

      - name: Bandit high-severity check
        run: |
          pip install bandit==1.9.4
          cd backend
          # Fail on high-severity issues (exit code non-zero)
          bandit -r . -ll --severity-level high -f txt
          echo "Backend security scan passed"

      - name: npm audit critical check
        run: |
          cd frontend
          npm audit --audit-level=critical
          echo "Frontend security audit passed"

  # ===========================================================================
  # Migration Gate (validates migrations before build)
  # ===========================================================================
  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate migrations
        uses: ./.github/actions/validate-migrations

  # ===========================================================================
  # Deploy to Render (backend only — frontend deploys via Vercel)
  # ===========================================================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [validate, test, security-gate, migration-gate]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      needs.security-gate.result == 'success' &&
      (needs.migration-gate.result == 'success' || needs.migration-gate.result == 'skipped')
    timeout-minutes: 15
    environment:
      name: production
      url: https://rateshift.app

    steps:
      - name: Trigger Render backend deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          echo "Triggering Render backend deploy..."
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK}" || {
            echo "::error::Failed to trigger backend deploy hook"
            exit 1
          }
          echo "Backend deploy hook triggered"

  # ===========================================================================
  # Smoke Tests with Self-Healing
  # ===========================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Wait for backend
        uses: ./.github/actions/wait-for-service
        with:
          url: ${{ secrets.PROD_API_URL }}/health
          timeout: '300'
          interval: '15'

      - name: Verify health endpoint
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.PROD_API_URL }}/health
          method: GET
          max-retries: 3
          initial-delay: 10

      - name: Verify prices endpoint
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.PROD_API_URL }}/api/v1/prices/current
          method: GET
          max-retries: 2
          initial-delay: 5

  # ===========================================================================
  # Rollback on Failure
  #
  # Triggered when smoke-tests fails. Rolls back the backend to its last
  # known-good deploy via the Render REST API (no new build minutes consumed).
  #
  # Required secrets:
  #   RENDER_API_KEY  – Render personal API token (Settings → API Keys)
  #
  # Render service IDs are hard-coded from the project's known configuration:
  #   Backend  srv-d649uhur433s73d557cg
  # ===========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [validate, smoke-tests]
    if: failure()
    timeout-minutes: 10

    env:
      RENDER_API_BASE: https://api.render.com/v1
      BACKEND_SERVICE_ID: srv-d649uhur433s73d557cg

    steps:
      - uses: actions/checkout@v4

      - name: Announce rollback intent
        run: |
          echo "::error::Production smoke tests failed."
          echo "Version attempted: ${{ needs.validate.outputs.version }}"
          echo "Initiating automated rollback to last known-good deploy..."

      # -----------------------------------------------------------------------
      # Backend rollback
      # -----------------------------------------------------------------------
      - name: Fetch last successful backend deploy ID
        id: last-backend-deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # List the 10 most-recent deploys for this service, then pick the
          # first one whose status is "live" (completed successfully).
          DEPLOY_ID=$(curl -fsS \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            "${RENDER_API_BASE}/services/${BACKEND_SERVICE_ID}/deploys?limit=10" \
            | jq -r '[.[] | select(.deploy.status == "live")] | .[0].deploy.id // empty')

          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::No previous successful backend deploy found. Manual rollback required."
            exit 1
          fi

          echo "Last successful backend deploy: $DEPLOY_ID"
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Rollback backend to last successful deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DEPLOY_ID: ${{ steps.last-backend-deploy.outputs.deploy_id }}
        run: |
          echo "Rolling backend back to deploy $DEPLOY_ID ..."
          RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${RENDER_API_BASE}/services/${BACKEND_SERVICE_ID}/deploys/${DEPLOY_ID}/rollback")
          echo "Render rollback response: $RESPONSE"
          echo "Backend rollback triggered."

      # -----------------------------------------------------------------------
      # Wait for rollback to become live and verify health
      # -----------------------------------------------------------------------
      - name: Wait for rollback to propagate
        run: |
          echo "Waiting 120 s for Render to complete rollback deploys..."
          sleep 120

      - name: Verify backend health after rollback
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=0
          until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${PROD_API_URL}/health" 2>/dev/null) || STATUS="000"
            echo "Attempt $((ATTEMPT+1))/${MAX_ATTEMPTS}: backend health returned HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy after rollback."
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
          done
          echo "::error::Backend did NOT recover after rollback. Immediate manual action required."
          exit 1

      - name: Rollback complete
        run: |
          echo "Rollback to last known-good backend deploy completed successfully."
          echo "Failed version: ${{ needs.validate.outputs.version }}"
          echo "Backend service is healthy at its previous deploy."
          echo "Frontend is managed by Vercel (no Render rollback needed)."

      - name: Notify Slack of rollback
        if: always()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Production Rollback"
          severity: critical

  # ===========================================================================
  # Notify Success
  # ===========================================================================
  notify-success:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [validate, smoke-tests]
    if: success()
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Notify Slack of successful deploy
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Production Deploy ${{ needs.validate.outputs.version }}"
          severity: info

      - name: Production deployment successful
        run: |
          echo "Production deployment successful!"
          echo "Version: ${{ needs.validate.outputs.version }}"
          echo "URL: https://rateshift.app"
