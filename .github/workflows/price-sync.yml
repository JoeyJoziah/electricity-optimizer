name: Sync Electricity Prices

on:
  # Cron moved to CF Worker Cron Trigger (wrangler.toml: "0 */6 * * *")
  # Manual trigger retained for ad-hoc runs
  workflow_dispatch:

permissions: {}

concurrency:
  group: price-sync
  cancel-in-progress: false

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/actions

      - name: Trigger price refresh
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/prices/refresh
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Sync Electricity Prices"
          severity: warning
