name: Sync Electricity Prices

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: price-sync
  cancel-in-progress: false

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Trigger price refresh
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/prices/refresh
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}

      - name: Trigger forecast generation
        if: success()
        run: |
          curl -fsS "${{ secrets.BACKEND_URL }}/health" > /dev/null 2>&1 && \
          echo "Backend healthy - forecasts will be generated from refreshed data" || \
          echo "::warning::Backend health check failed after price refresh"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Sync Electricity Prices"
          severity: warning
