name: Data Health Check

on:
  schedule:
    # Daily at 8am UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: data-health-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Check data pipeline health
        id: health
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/health-data
          method: GET
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}

      - name: Validate health response
        env:
          API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          API_URL: ${{ secrets.BACKEND_URL }}
        run: |
          # Re-fetch to parse the JSON body (retry-curl only outputs status code)
          RESPONSE=$(curl -fsS -X GET \
            -H "X-API-Key: ${API_KEY}" \
            "${API_URL}/api/v1/internal/health-data")

          echo "$RESPONSE" | jq .

          # Fail if critical tables are empty
          CRITICAL=$(echo "$RESPONSE" | jq -r '.critical_empty | length')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical tables are empty: $(echo "$RESPONSE" | jq -r '.critical_empty | join(", ")')"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Data Health Check"
          severity: warning
