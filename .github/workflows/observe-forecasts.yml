name: Observe Forecast Actuals

on:
  # Cron moved to CF Worker Cron Trigger (wrangler.toml: "30 */6 * * *")
  # Manual trigger retained for ad-hoc runs
  workflow_dispatch:

permissions: {}

concurrency:
  group: observe-forecasts
  cancel-in-progress: false

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/actions

      - name: Backfill actual prices into forecast observations
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/observe-forecasts
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json
          body: '{}'

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Observe Forecast Actuals"
          severity: info
