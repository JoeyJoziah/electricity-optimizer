name: Detect Rate Changes

on:
  # Cron trigger moved to daily-data-pipeline.yml (consolidated)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/actions

      - name: Warmup backend
        uses: ./.github/actions/warmup-backend
        with:
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Detect rate changes
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/detect-rate-changes
          method: POST
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Detect Rate Changes"
          severity: warning
