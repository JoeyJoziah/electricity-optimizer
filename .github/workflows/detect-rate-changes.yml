name: Detect Rate Changes

on:
  schedule:
    # Daily at 6:30am UTC — after price fetch workflows complete
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect rate changes
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ vars.BACKEND_URL }}/api/v1/internal/detect-rate-changes
          method: POST
          api-key: ${{ secrets.INTERNAL_API_KEY }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          status: 'failure'
          title: 'Rate Change Detection Failed'
          message: 'detect-rate-changes workflow failed'
