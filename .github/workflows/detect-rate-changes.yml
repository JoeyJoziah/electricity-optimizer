name: Detect Rate Changes

on:
  # Cron trigger moved to daily-data-pipeline.yml (consolidated)
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Warmup backend
        uses: ./.github/actions/warmup-backend
        with:
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Detect rate changes
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ vars.BACKEND_URL }}/api/v1/internal/detect-rate-changes
          method: POST
          api-key: ${{ secrets.INTERNAL_API_KEY }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Detect Rate Changes"
          severity: warning
