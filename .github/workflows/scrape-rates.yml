name: Scrape Supplier Rates

on:
  schedule:
    # Daily at 3 AM UTC (after market research at 2 AM)
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-rates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Concurrent scraper: ceil(37/5) * 12s ≈ 96s. Backend Render timeout
    # adds overhead; allow 10 min for Render cold-start + 3 retry attempts.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Warmup backend
        uses: ./.github/actions/warmup-backend
        with:
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Scrape all supplier rate pages
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/scrape-rates
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json
          body: '{}'
          # Concurrent scraper completes in ~96s; give 3 min for Render cold start
          timeout: '180'

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Scrape Supplier Rates"
          severity: info
