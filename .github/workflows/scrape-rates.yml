name: Scrape Supplier Rates

on:
  schedule:
    # Daily at 3 AM UTC (after market research at 2 AM)
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-rates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 37 suppliers x 12s rate limit = ~7.5 min. Allow 15 min for safety.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Scrape all supplier rate pages
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/scrape-rates
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json
          body: '{}'

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Scrape Supplier Rates"
          severity: info
