name: Agent Switcher - Sync Available Plans

on:
  schedule:
    # Daily at 2am UTC — refresh available plans cache before the 4am switcher scan
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: sync-available-plans
  cancel-in-progress: false

jobs:
  sync-plans:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/actions

      - name: Warmup backend
        uses: ./.github/actions/warmup-backend
        with:
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Sync available plans cache
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/agent-switcher/sync-plans
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json
          body: '{}'

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Agent Switcher - Sync Available Plans"
          severity: warning
