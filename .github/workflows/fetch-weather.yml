name: Fetch Weather Data

on:
  schedule:
    # Every 12 hours (offset 15min from price-sync to avoid collision, optimized for GHA budget)
    - cron: "15 */12 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: fetch-weather
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Warmup backend
        uses: ./.github/actions/warmup-backend
        with:
          backend-url: ${{ secrets.BACKEND_URL }}
          max-attempts: '3'
          delay-seconds: '10'

      - name: Fetch weather for all US regions
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/fetch-weather
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Fetch Weather Data"
          severity: warning
