name: Weekly Data Retention Cleanup

on:
  schedule:
    # Run every Sunday at 4 AM UTC (avoids scrape-rates at 3am)
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: data-retention
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Run data retention cleanup
        uses: ./.github/actions/retry-curl
        with:
          url: ${{ secrets.BACKEND_URL }}/api/v1/internal/maintenance/cleanup
          headers: |
            X-API-Key: ${{ secrets.INTERNAL_API_KEY }}
            Content-Type: application/json

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "Weekly Data Retention Cleanup"
          severity: warning
