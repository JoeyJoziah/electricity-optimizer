name: Weekly Data Retention Cleanup

on:
  schedule:
    # Run every Sunday at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: data-retention
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run data retention cleanup
        run: |
          curl -fsS -X POST \
            -H "X-API-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.BACKEND_URL }}/api/v1/internal/maintenance/cleanup" || exit 1
