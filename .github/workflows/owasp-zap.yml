name: OWASP ZAP Baseline Scan

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 4am UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@906a3c93ffde4864839d31a93daadcbd2737b4da # v0.12.0
        with:
          target: ${{ secrets.RENDER_BACKEND_URL || 'https://api.rateshift.app' }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          fail_action: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_INCIDENTS_WEBHOOK_URL }}
          workflow-name: "OWASP ZAP Baseline Scan"
          severity: warning
