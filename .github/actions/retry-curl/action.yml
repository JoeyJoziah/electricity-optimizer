name: 'Retry Curl'
description: 'Makes an HTTP request with exponential backoff retry on failure'

inputs:
  url:
    description: 'URL to call'
    required: true
  method:
    description: 'HTTP method'
    required: false
    default: 'POST'
  headers:
    description: 'Newline-separated headers (e.g. "X-API-Key: abc\nContent-Type: application/json")'
    required: false
    default: ''
  body:
    description: 'Request body'
    required: false
    default: '{}'
  max-retries:
    description: 'Max retry attempts'
    required: false
    default: '3'
  initial-delay:
    description: 'Initial delay in seconds'
    required: false
    default: '5'
  max-delay:
    description: 'Max delay in seconds'
    required: false
    default: '60'
  timeout:
    description: 'Curl timeout in seconds'
    required: false
    default: '120'

outputs:
  status-code:
    description: 'HTTP status code from final attempt'
    value: ${{ steps.curl-with-retry.outputs.status-code }}
  attempts:
    description: 'Number of attempts made'
    value: ${{ steps.curl-with-retry.outputs.attempts }}

runs:
  using: 'composite'
  steps:
    - name: Execute curl with retry
      id: curl-with-retry
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_METHOD: ${{ inputs.method }}
        INPUT_HEADERS: ${{ inputs.headers }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_MAX_RETRIES: ${{ inputs.max-retries }}
        INPUT_INITIAL_DELAY: ${{ inputs.initial-delay }}
        INPUT_MAX_DELAY: ${{ inputs.max-delay }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
      run: |
        URL="$INPUT_URL"
        METHOD="$INPUT_METHOD"
        HEADERS="$INPUT_HEADERS"
        BODY="$INPUT_BODY"
        MAX_RETRIES=$INPUT_MAX_RETRIES
        INITIAL_DELAY=$INPUT_INITIAL_DELAY
        MAX_DELAY=$INPUT_MAX_DELAY
        CURL_TIMEOUT=$INPUT_TIMEOUT

        STATUS="000"
        ATTEMPTS=0
        MAX_ATTEMPTS=$((MAX_RETRIES + 1))

        # Write body to temp file to avoid shell quoting issues with JSON
        BODY_FILE=$(mktemp)
        printf '%s' "$BODY" > "$BODY_FILE"
        trap "rm -f '$BODY_FILE'" EXIT

        # Build header args array
        HEADER_ARGS=()
        if [ -n "$HEADERS" ]; then
          while IFS= read -r header; do
            if [ -n "$header" ]; then
              HEADER_ARGS+=(-H "$header")
            fi
          done <<< "$HEADERS"
        fi

        # Determine if body should be sent
        UPPER_METHOD=$(echo "$METHOD" | tr '[:lower:]' '[:upper:]')
        BODY_ARGS=()
        if [ "$UPPER_METHOD" = "POST" ] || [ "$UPPER_METHOD" = "PUT" ] || [ "$UPPER_METHOD" = "PATCH" ]; then
          BODY_ARGS=(-d "@${BODY_FILE}")
        fi

        for attempt in $(seq 0 $MAX_RETRIES); do
          ATTEMPTS=$((attempt + 1))

          echo "Attempt ${ATTEMPTS}/${MAX_ATTEMPTS}: ${METHOD} ${URL}"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X "${METHOD}" \
            --max-time "${CURL_TIMEOUT}" \
            "${HEADER_ARGS[@]}" \
            "${BODY_ARGS[@]}" \
            "${URL}" 2>/dev/null) || STATUS="000"
          echo "  Response: HTTP ${STATUS}"

          # 2xx success
          if [[ "$STATUS" =~ ^2 ]]; then
            echo "status-code=${STATUS}" >> "$GITHUB_OUTPUT"
            echo "attempts=${ATTEMPTS}" >> "$GITHUB_OUTPUT"
            echo "Success on attempt ${ATTEMPTS} (HTTP ${STATUS})"
            exit 0
          fi

          # 4xx (non-retryable) â€” except 429 (rate limit) and 408 (request timeout)
          if [[ "$STATUS" =~ ^4 ]] && [ "$STATUS" != "429" ] && [ "$STATUS" != "408" ]; then
            echo "status-code=${STATUS}" >> "$GITHUB_OUTPUT"
            echo "attempts=${ATTEMPTS}" >> "$GITHUB_OUTPUT"
            echo "Non-retryable error on attempt ${ATTEMPTS} (HTTP ${STATUS})"
            exit 1
          fi

          # If this was the last attempt, stop here
          if [ $attempt -ge $MAX_RETRIES ]; then
            break
          fi

          # 5xx, 429, 408, or 000 â€” calculate backoff with jitter and retry
          JITTER=$((RANDOM % INITIAL_DELAY))
          DELAY=$(( INITIAL_DELAY * (1 << attempt) + JITTER ))
          if [ $DELAY -gt $MAX_DELAY ]; then
            DELAY=$MAX_DELAY
          fi

          echo "  Retrying in ${DELAY}s (status: ${STATUS})..."
          sleep $DELAY
        done

        echo "status-code=${STATUS}" >> "$GITHUB_OUTPUT"
        echo "attempts=${ATTEMPTS}" >> "$GITHUB_OUTPUT"
        echo "All ${ATTEMPTS} attempts exhausted (final status: HTTP ${STATUS})"
        exit 1
