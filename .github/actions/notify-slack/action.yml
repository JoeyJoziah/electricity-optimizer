name: 'Notify Slack'
description: 'Sends failure notification to Slack'
inputs:
  webhook-url:
    description: 'Slack incoming webhook URL'
    required: true
  workflow-name:
    description: 'Name of the workflow that failed'
    required: true
  severity:
    description: 'Severity level: critical, warning, or info'
    required: true
  run-url:
    description: 'Link to the failed run'
    required: false
    default: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
runs:
  using: 'composite'
  steps:
    - name: Send Slack notification
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.webhook-url }}
        SLACK_SEVERITY: ${{ inputs.severity }}
        SLACK_WORKFLOW_NAME: ${{ inputs.workflow-name }}
        SLACK_RUN_URL: ${{ inputs.run-url }}
        SLACK_REPOSITORY: ${{ github.repository }}
      run: |
        # Map severity to color
        case "${SLACK_SEVERITY}" in
          critical) COLOR="danger" ;;
          warning)  COLOR="warning" ;;
          info)     COLOR="#439FE0" ;;
          *)        COLOR="#439FE0" ;;
        esac

        # Map severity to emoji
        case "${SLACK_SEVERITY}" in
          critical) EMOJI=":rotating_light:" ;;
          warning)  EMOJI=":warning:" ;;
          info)     EMOJI=":information_source:" ;;
          *)        EMOJI=":information_source:" ;;
        esac

        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

        PAYLOAD=$(cat <<EOF
        {
          "attachments": [{
            "color": "${COLOR}",
            "blocks": [{
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "${EMOJI} *CI/CD Alert: ${SLACK_WORKFLOW_NAME}*\nSeverity: ${SLACK_SEVERITY}\n<${SLACK_RUN_URL}|View Run Logs>"
              }
            }, {
              "type": "context",
              "elements": [{
                "type": "mrkdwn",
                "text": "Triggered at ${TIMESTAMP} | Repository: ${SLACK_REPOSITORY}"
              }]
            }]
          }]
        }
        EOF
        )

        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          -d "${PAYLOAD}" \
          "${SLACK_WEBHOOK_URL}" || true
