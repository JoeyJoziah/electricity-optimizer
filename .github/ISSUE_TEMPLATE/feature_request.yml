name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so we can understand the use case and evaluate it.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you would like to see.
      placeholder: What should this feature do?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe the problem you are trying to solve or the job this feature would help you accomplish.
      placeholder: "As a [type of user], I want [some goal] so that [some reason]."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds? If so, describe them.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use of the product

  - type: dropdown
    id: account_tier
    attributes:
      label: Account Tier
      description: What subscription tier is your account on?
      options:
        - Free
        - Pro
        - Business
        - Not sure

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any mockups, examples from other tools, or other context that would help clarify the feature request.
