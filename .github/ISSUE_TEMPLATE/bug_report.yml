name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill out the sections below as thoroughly as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages you saw.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this bug affect your use of the product?
      options:
        - Critical (data loss, security issue, or complete feature broken)
        - High (core feature significantly impaired)
        - Medium (non-critical feature impaired or workaround exists)
        - Low (minor issue or cosmetic problem)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using?
      placeholder: "e.g. Chrome 122, Firefox 123, Safari 17"

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which operating system were you on?
      placeholder: "e.g. macOS 14.3, Windows 11, Ubuntu 22.04"

  - type: dropdown
    id: account_tier
    attributes:
      label: Account Tier
      description: What subscription tier is your account on?
      options:
        - Free
        - Pro
        - Business
        - Not sure

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Screen Recordings
      description: If applicable, add screenshots or a screen recording to help explain the problem. You can paste images directly into this field.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g. region you are monitoring, steps you already tried, links to related issues).
