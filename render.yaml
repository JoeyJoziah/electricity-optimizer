services:
  - type: web
    name: electricity-optimizer
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FLATPEAK_API_KEY
        sync: false
      - key: NREL_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: IEA_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: INTERNAL_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: DATA_RESIDENCY
        value: US
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # --- Free-tier integrations (2026-03-05) ---
      - key: UPTIMEROBOT_API_KEY
        sync: false
      - key: DIFFBOT_API_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_REST_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # --- OpenTelemetry distributed tracing ---
      - key: OTEL_ENABLED
        value: "true"
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      # --- AI Agent ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: ENABLE_AI_AGENT
        value: "true"
      # --- Frontend + UtilityAPI ---
      - key: FRONTEND_URL
        sync: false
      - key: UTILITYAPI_KEY
        sync: false
      # --- Gmail OAuth (email import connections) ---
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      # --- Outlook OAuth (email import connections) ---
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_CLIENT_SECRET
        sync: false
      # --- Gmail SMTP (transactional email fallback) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: cron
    name: db-maintenance
    runtime: docker
    plan: free
    schedule: "0 3 * * 0"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/db_maintenance.py
    envVars:
      - key: DATABASE_URL
        sync: false
